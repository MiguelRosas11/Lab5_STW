<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Blog</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="layout">

    <!-- PANEL IZQUIERDO CREAR POST -->
    <aside class="create-panel">

        <h2>Crear Post</h2>
        <p>Escribe un mensaje y publícalo.</p>

        <input id="authorInput" type="text" placeholder="Tu nombre">

        <textarea id="postInput" placeholder="Escribe tu mensaje..."></textarea>

        <button id="publishBtn">Publicar</button>

        <div id="createFeedback"></div>

    </aside>


    <!-- PANEL DERECHO POSTS -->
    <section class="posts-panel">

        <div class="search-bar">

            <select id="searchType">
                <option value="text">Buscar por texto</option>
                <option value="id">Buscar por ID</option>
            </select>

            <input id="searchInput" type="text" placeholder="Buscar post">

            <button id="searchBtn">Buscar</button>

            <button id="clearBtn">Mostrar todos</button>

        </div>


        <div class="posts-wrapper">

            <div id="uiState" class="ui-state"></div>

            <div id="postsContainer" class="posts-container"></div>

        </div>

    </section>

</div>

<script src="js/app.js"></script>

</body>
</html>
